<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <link rel="stylesheet" href="style21.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>

<body>

    <div class="container">

        <div class="music-player">

            <nav>
                <div class="circle">
                    <i class="fa-solid fa-heart"></i>
                </div>

                <div class="title">
                    <h4>Now Playing</h4>
                </div>

                <div class="circle">
                    <i class="fa-solid fa-plus"></i>
                </div>
            </nav>
            <img src="./assets/img/chill/chill1.png" class="song-img">
            <h1 id="titlename">Chill With Me</h1>
            <p id="singer">Ft. Tubebackr</p>
            <audio id="song"
            src=""
            >
            </audio>
            <div id="time-progress">
                <div id="time-progress2" class="time">
                    <span id="current-time">0:00</span>
                </div>
                <div id="time-progress1">
                    <div class="dot">
                        <input type="range" value="0" id="progress">
                    </div>
                </div>

                <div class="time" id="time-duration">
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <div class="prev-track">
                    <i class="fa-solid fa-backward-step"></i>
                </div>

                <div id="play-pause">
                    <i class="fa-solid fa-play" id="action"></i>
                </div>

                <div class="next-track">
                    <i class="fa-solid fa-forward-step"></i>
                </div>
            </div>
            <div class="controls">
                <div class="mute">
                    <i class="fa-solid fa-volume-xmark" id="mutebtn"></i>
                    <!-- <i class="fa-solid fa-volume-high"></i> -->
                </div>
            </div>

        </div>
    </div>
    <script src="main-index-files copy/search.js"></script>
    <script src="new1.js"></script>

</body>
</html>
